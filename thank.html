<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mahadsanid</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4da6,#ff0066,#b30047);
color:white;
text-align:center;
overflow:hidden;
}

/* box */

.container{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:40px;
border-radius:25px;
box-shadow:0 10px 35px rgba(0,0,0,0.3);
max-width:400px;
width:90%;
}

/* gif */

.gif{
width:220px;
margin-bottom:20px;
border-radius:15px;
}

/* text */

h1{
margin-bottom:10px;
}

p{
opacity:0.9;
}

/* button */

.btn{
margin-top:20px;
display:inline-block;
background:white;
color:#ff0066;
padding:10px 20px;
border-radius:12px;
text-decoration:none;
font-weight:600;
transition:0.3s;
}

.btn:hover{
transform:translateY(-3px);
}
.credit{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
font-size:18px;
font-weight:bold;
color:white;
padding:6px 15px;
border-radius:20px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
box-shadow:0 0 15px rgba(255,0,100,0.7);
animation:glow 2s infinite alternate;
}

.credit .heart{
display:inline-block;
animation:beat 0.8s infinite;
margin:0 5px;
}

@keyframes beat{
0%,100%{
transform:scale(1);
}
50%{
transform:scale(1.4);
}
}

@keyframes glow{
0%{
box-shadow:0 0 10px rgba(255,0,100,0.6);
}
100%{
box-shadow:0 0 25px rgba(255,0,100,1);
}
}
</style>
</head>

<body>

<div class="container">

<img class="gif"
src="https://i.ibb.co/SX2fGkFT/74d1b3c837ff6cf5e872275905dce4b2.gif"
alt="Love GIF">

<h1>❤️ Mahadsanid💞</h1>

<p>fariinta wa isoo gaartay qalbi💌🧡</p>

<a href="Inbox.html" class="btn">⬅ Back</a>

</div>
<div class="credit">
<span class="heart">❤️</span>
Created by Mohamed
<span class="heart">❤️</span>
</div>
</body>
</html>
