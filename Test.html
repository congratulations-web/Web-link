<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Firebase Products Test</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
padding:40px;
}

.container{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.card{
background:white;
padding:15px;
border-radius:10px;
width:200px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

.price{
color:green;
font-weight:bold;
}
</style>

</head>
<body>

<h2>Products From Firebase</h2>

<div class="container" id="products"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyB03Fe0IWtYUyxukjsBCIsEGyAQT-HfiaI",
authDomain: "requester-7cd1a.firebaseapp.com",
projectId: "requester-7cd1a",
storageBucket: "requester-7cd1a.firebasestorage.app",
messagingSenderId: "701863589674",
appId: "1:701863589674:web:13aabffbdd0463dd605053",
measurementId: "G-9PL7QVEBF2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const productsDiv = document.getElementById("products");

async function loadProducts(){

const querySnapshot = await getDocs(collection(db,"products"));

querySnapshot.forEach((doc)=>{

const data = doc.data();

productsDiv.innerHTML += `
<div class="card">
<img src="${data.image}">
<h3>${data.name}</h3>
<p class="price">$${data.price}</p>
</div>
`;

});

}

loadProducts();

</script>

</body>
</html>
